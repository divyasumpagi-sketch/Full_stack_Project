{% extends "base.html" %}
{% block title %}Edit Task - FullStack Pro{% endblock %}

{% block content %}

<div class="page-header">
  <h1>✏️ Edit Task</h1>
  <p>Update your task details</p>
</div>

<div class="form-container">
  <h2>Update Task</h2>
  <p class="form-subtitle">Editing: <strong>{{ task.title }}</strong></p>

  <form method="POST" action="{{ url_for('edit_task', id=task.id) }}">

    <div class="form-group">
      <label for="title">Task Title</label>
      <input type="text" id="title" name="title"
             value="{{ task.title }}" required />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3">{{ task.description or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        {% for s in ['Pending', 'In Progress', 'Completed'] %}
        <option value="{{ s }}" {% if task.status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex; gap:1rem; margin-top:0.5rem;">
      <button type="submit" class="btn btn-warning" style="flex:1;">Update ✏️</button>
      <a href="{{ url_for('tasks') }}" class="btn btn-outline" style="flex:1; text-align:center; padding-top:0.65rem;">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
